name: Bump formae appVersion

on:
  repository_dispatch:
    types: [formae-release]

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version format
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate peldroid token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update Chart.yaml
        uses: mikefarah/yq@master
        with:
          cmd: |
            yq -i '.appVersion = strenv(VERSION)' Chart.yaml
            yq -i '.version = strenv(VERSION)' Chart.yaml

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/bump-formae-${{ env.VERSION }}
          commit-message: "chore: bump formae to ${{ env.VERSION }}"
          title: "chore: bump formae to ${{ env.VERSION }}"
          body: |
            Automated PR to update formae to version `${{ env.VERSION }}`.

            - `appVersion` → `${{ env.VERSION }}`
            - `version` → `${{ env.VERSION }}`

            Triggered by a new release in [platform-engineering-labs/formae](https://github.com/platform-engineering-labs/formae).
          labels: automated
