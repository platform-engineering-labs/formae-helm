name: Bump formae appVersion

on:
  repository_dispatch:
    types: [formae-release]

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version format
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate peldroid token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PELDROID_APP_ID }}
          private-key: ${{ secrets.PELDROID_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update Chart.yaml
        uses: mikefarah/yq@master
        with:
          cmd: |
            yq -i '.appVersion = strenv(VERSION)' Chart.yaml
            yq -i '.version = strenv(VERSION)' Chart.yaml

      - name: Commit, push, and create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="chore/bump-formae-${VERSION}"
          git config user.name "peldroid[bot]"
          git config user.email "peldroid[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Chart.yaml
          git commit -m "chore: bump formae to ${VERSION}"
          git push --force -u origin "$BRANCH"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for branch ${BRANCH}, updated with force push."
            exit 0
          fi
          gh pr create \
            --title "chore: bump formae to ${VERSION}" \
            --body "Automated PR to update formae to version \`${VERSION}\`.

          - \`appVersion\` → \`${VERSION}\`
          - \`version\` → \`${VERSION}\`

          Triggered by a new release in [platform-engineering-labs/formae](https://github.com/platform-engineering-labs/formae)."
